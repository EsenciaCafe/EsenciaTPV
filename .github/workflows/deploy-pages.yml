name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: https://tbqvypdxcgeofsmiqmuo.supabase.co
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRicXZ5cGR4Y2dlb2ZzbWlxbXVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTYzNjksImV4cCI6MjA5NzE5MjM2OX0.ZMqtvOSD-zwtC76n76A3wj06LbETcLTuQA9wPeXhbHk' }}
          VITE_LOYALTY_SUPABASE_URL: https://tojcqhfyjebefyfeqpxv.supabase.co
          VITE_LOYALTY_SUPABASE_ANON_KEY: ${{ secrets.VITE_LOYALTY_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvamNxaGZ5amViZWZ5ZmVxcHh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3Njg3ODAsImV4cCI6MjA5NDM0NDc4MH0.k6yMdNqQhzQDtrOb_jX7fvRD0bgFqTrQRrborOElkx8' }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: https://esenciacafe.github.io/EsenciaTPV/
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages (attempt 1)
        id: deployment_attempt_1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry
        if: steps.deployment_attempt_1.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (attempt 2)
        id: deployment_attempt_2
        if: steps.deployment_attempt_1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before final retry
        if: steps.deployment_attempt_1.outcome == 'failure' && steps.deployment_attempt_2.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (attempt 3)
        id: deployment_attempt_3
        if: steps.deployment_attempt_1.outcome == 'failure' && steps.deployment_attempt_2.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Confirm deployment result
        if: steps.deployment_attempt_1.outcome == 'failure' && steps.deployment_attempt_2.outcome == 'failure' && steps.deployment_attempt_3.outcome == 'failure'
        run: exit 1
