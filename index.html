<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!-- Optimized viewport for mobile terminals: prevents default scaling/pinch zoom to keep buttons snappy -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>TPV Cafetería Comandero</title>
  
  <!-- SEO & PWA Meta -->
  <meta name="description" content="Terminal de Punto de Venta optimizado para comanderos táctiles de cafeterías y restaurantes.">
  <meta name="theme-color" content="#121824">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon.svg">

  <!-- Typography: Outfit Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/src/style.css">
  <!-- jsPDF for programmatic PDF generation (no html2canvas dependency) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
  <div id="app-root">
    <!-- App shell will be dynamically rendered and updated here by main.js -->
  </div>
  <div id="app-loading-overlay">
    <div class="loading-spinner"></div>
    <p class="loading-message">Cargando catálogo...</p>
  </div>
  <script type="module" src="/src/main.js"></script>

</body>
</html>
